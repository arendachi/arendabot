name: 🤖 Daily Scrape JoyEstate

on:
  schedule:
    # Каждый день в 03:00 UTC (05:00 Ташкент)
    - cron: '0 3 * * *'
  
  # Можно также запустить вручную
  workflow_dispatch:
  
  # Или при пуше в main
  push:
    branches:
      - main
    paths:
      - 'scraper_joyestate.js'
      - '.github/workflows/scrape.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Клонируем репозиторий
      - name: ✅ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Устанавливаем Node.js
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Устанавливаем зависимости
      - name: 📥 Install dependencies
        run: npm ci

      # Создаём папку для логов
      - name: 📁 Create logs directory
        run: mkdir -p logs

      # Запускаем парсер
      - name: 🕷️ Run scraper
        run: npm run scrape 2>&1 | tee logs/scraper.log
        env:
          CI: true

      # Проверяем, изменились ли данные
      - name: 🔍 Check for changes
        id: verify
        run: |
          if git diff --quiet data/listings.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Настраиваем Git для коммита
      - name: ⚙️ Configure Git
        if: steps.verify.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      # Коммитим и пушим изменения
      - name: 📤 Commit and push
        if: steps.verify.outputs.changed == 'true'
        run: |
          git add data/listings.json
          git add logs/scraper.log || true
          git commit -m "🔄 Update listings: $(date '+%Y-%m-%d %H:%M:%S UTC')" \
                     -m "✨ Автоматическое обновление базы данных" \
                     -m "📊 Объявлений найдено: $(wc -l < data/listings.json)" \
                     -m "🤖 GitHub Actions: ${{ github.run_id }}"
          git push

      # Отправляем уведомление при ошибке
      - name: 🚨 Notify on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ Ошибка при запуске парсера!

Проверьте [логи действия](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            })

      # Сохраняем логи как артифакт
      - name: 📎 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: logs/
          retention-days: 30

      # Отправляем статистику
      - name: 📊 Print statistics
        if: always()
        run: |
          echo "=== Статистика парсера ==="
          echo "Файл: data/listings.json"
          if [ -f "data/listings.json" ]; then
            SIZE=$(wc -c < data/listings.json | numfmt --to=iec-i --suffix=B)
            LINES=$(wc -l < data/listings.json)
            echo "Размер: $SIZE"
            echo "Строк: $LINES"
          fi
          echo "Время завершения: $(date)"
