name: 🤖 Daily Scrape JoyEstate

on:
  schedule:
    # Каждый день в 03:00 UTC (05:00 Ташкент)
    - cron: '0 3 * * *'
  
  workflow_dispatch:
  
  push:
    branches:
      - main
    paths:
      - 'scraper_joyestate.js'
      - '.github/workflows/scrape.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📁 Create logs directory
        run: mkdir -p logs

      - name: 📥 Install dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: 🕷️ Run scraper
        id: scraper
        continue-on-error: true
        run: |
          npm run scrape 2>&1 | tee logs/scraper.log
        env:
          CI: true

      - name: 🔍 Check for changes
        id: verify
        continue-on-error: true
        run: |
          if [ -f "data/listings.json" ]; then
            if git diff --quiet data/listings.json; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: ⚙️ Configure Git
        if: steps.verify.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: 📤 Commit and push
        if: steps.verify.outputs.changed == 'true'
        continue-on-error: true
        run: |
          git add data/listings.json
          git add logs/scraper.log || true
          git commit -m "🔄 Update listings: $(date '+%Y-%m-%d %H:%M:%S UTC')" \
                     -m "✨ Автоматическое обновление базы данных" \
                     -m "📊 GitHub Actions: ${{ github.run_id }}"
          git push

      - name: 📎 Upload logs
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: logs/
          retention-days: 30
          if-no-files-found: ignore

      - name: 📊 Print statistics
        if: always()
        continue-on-error: true
        run: |
          echo "=== Статистика парсера ==="
          if [ -f "data/listings.json" ]; then
            echo "Файл: data/listings.json"
            SIZE=$(wc -c < data/listings.json | numfmt --to=iec-i --suffix=B)
            LINES=$(wc -l < data/listings.json)
            echo "Размер: $SIZE"
            echo "Строк: $LINES"
          fi
          echo "Время: $(date)"
