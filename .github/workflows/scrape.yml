name: 🤖 Daily Scrape JoyEstate

on:
  schedule:
    # Каждый день в 03:00 UTC (05:00 Ташкент)
    - cron: '0 3 * * *'
  
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📁 Create directories
        run: mkdir -p data logs

      - name: 🕷️ Run scraper
        id: scraper
        run: node scraper_joyestate.js 2>&1 | tee logs/scraper.log
        timeout-minutes: 5
        continue-on-error: true

      - name: 📊 Check results
        id: check
        run: |
          if [ -f "data/listings.json" ]; then
            SIZE=$(wc -c < data/listings.json)
            LINES=$(wc -l < data/listings.json)
            echo "size=$SIZE" >> $GITHUB_OUTPUT
            echo "lines=$LINES" >> $GITHUB_OUTPUT
            echo "✅ Файл создан успешно ($SIZE bytes)"
          else
            echo "❌ Файл не создан!"
            exit 1
          fi

      - name: 📤 Commit and push
        if: always()
        continue-on-error: true
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/listings.json logs/scraper.log || true
          git diff --quiet && exit 0
          git commit -m "🔄 Update listings: $(date '+%Y-%m-%d %H:%M:%S UTC')" || true
          git push || true

      - name: 📎 Upload logs
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: ✨ Summary
        if: always()
        run: |
          echo "=== Парсер завершил работу ==="
          echo "Статус: OK"
          echo "Время: $(date)"
          if [ -f "data/listings.json" ]; then
            echo "Файл: ✅ Создан"
            wc -c < data/listings.json | xargs -I {} echo "Размер: {} bytes"
          else
            echo "Файл: ❌ Не создан"
          fi
